<!DOCTYPE html>
<html>
<head>
    <title>Interview History</title>
</head>
<body>

    <h1>Interview History</h1>

    <table border="1">
        <tr>
            <th>Domain</th>
            <th>Question</th>
            <th>Your Answer</th>
            <th>AI Feedback</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
